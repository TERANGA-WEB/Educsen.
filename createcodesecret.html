<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Créer mon code secret · ÉducSen</title>
    <!-- Police moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: white;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 20, 30, 0.15),
                        0 2px 4px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0a2e4a;
            margin-bottom: 0.5rem;
        }

        .subhead {
            font-size: 0.95rem;
            color: #4a6877;
            margin-bottom: 2.2rem;
            font-weight: 400;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1rem;
        }

        .code-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1e4c6b;
            margin-bottom: 0.75rem;
        }

        .code-inputs {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .digit-box {
            width: 4.5rem;
            height: 5rem;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 600;
            text-align: center;
            color: #0a2e4a;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            outline: none;
            caret-color: #2563eb;
        }

        .digit-box:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: #fafcff;
        }

        .digit-box.error {
            border-color: #e53e3e;
            background-color: #fff5f5;
        }

        /* Enlever les flèches sur input number */
        .digit-box::-webkit-outer-spin-button,
        .digit-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .digit-box[type=number] {
            -moz-appearance: textfield;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #1e4c6b, #113946);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(17, 57, 70, 0.2);
            letter-spacing: 0.3px;
            margin-top: 0.5rem;
            gap: 0.6rem;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(135deg, #1f5579, #0e3b4a);
            box-shadow: 0 12px 24px rgba(17, 57, 70, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
            background: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #c53030;
            background: #fff5f5;
            border-radius: 14px;
            padding: 0.9rem 1.2rem;
            margin-top: 1.6rem;
            font-size: 0.9rem;
            border-left: 4px solid #c53030;
            font-weight: 500;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-text {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #5e7a8c;
            text-align: center;
            background: #f0f6fa;
            padding: 0.8rem;
            border-radius: 14px;
        }

        .loader-init {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #1e4c6b;
        }

        .loader-init .spinner {
            border-top-color: #1e4c6b;
            border: 3px solid #cbd5e0;
            border-top-color: #1e4c6b;
            width: 2.5rem;
            height: 2.5rem;
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        .code-form {
            transition: opacity 0.2s;
        }

        @media (max-width: 400px) {
            .card { padding: 1.8rem 1.2rem; }
            .digit-box { width: 3.8rem; height: 4.5rem; font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Écran de chargement initial (vérification auth) -->
            <div id="initLoader" class="loader-init">
                <div class="spinner"></div>
                <p style="font-weight: 500;">Vérification de votre session...</p>
            </div>

            <!-- Formulaire code secret (caché par défaut) -->
            <div id="codeFormContainer" class="code-form hidden">
                <h1>🔐 Créer votre code</h1>
                <div class="subhead">4 chiffres pour sécuriser votre accès</div>

                <span class="code-label">Code secret</span>
                <div class="code-inputs" id="codeInputsGroup">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit1" autofocus>
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit2">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit3">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit4">
                </div>

                <button class="btn" id="submitBtn" disabled>
                    <span id="btnText">Suivant</span>
                    <span id="btnSpinner" class="spinner hidden"></span>
                </button>

                <div id="errorBox" class="error-message"></div>
                <div class="info-text">
                    ⚠️ Code stocké de façon sécurisée (version démo, clair)
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ---------- FIREBASE v9 MODULAR (CDN) ----------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

        // ---------- CONFIGURATION FIREBASE (fournie) ----------
        const firebaseConfig = {
            apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
            authDomain: "real-educsen.firebaseapp.com",
            projectId: "real-educsen",
            storageBucket: "real-educsen.firebasestorage.app",
            messagingSenderId: "80660233362",
            appId: "1:80660233362:web:5edf5060254170056eba4b"
        };

        // ---------- INITIALISATION ----------
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ---------- ÉLÉMENTS DOM ----------
        const initLoader = document.getElementById('initLoader');
        const formContainer = document.getElementById('codeFormContainer');
        const digit1 = document.getElementById('digit1');
        const digit2 = document.getElementById('digit2');
        const digit3 = document.getElementById('digit3');
        const digit4 = document.getElementById('digit4');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorBox = document.getElementById('errorBox');

        // Tous les champs code
        const digitInputs = [digit1, digit2, digit3, digit4];

        // ---------- VÉRIFICATION AUTH ----------
        onAuthStateChanged(auth, (user) => {
            // Cacher loader
            initLoader.style.display = 'none';

            if (!user) {
                // Non connecté → redirection vers inscription.html
                window.location.replace('inscription.html');
                return;
            }

            // Utilisateur connecté → afficher le formulaire
            formContainer.classList.remove('hidden');
            
            // On peut stocker l'email et uid dans des attributs data ou variables
            // On les utilisera au moment de l'enregistrement
            window.currentUser = user; // accessible dans le module

            // Initialiser la validation en temps réel
            setupCodeValidation();
        });

        // ---------- FONCTIONS DE VALIDATION & UI ----------
        function setupCodeValidation() {
            // Forcer chiffres, max 1 caractère, auto-saut
            digitInputs.forEach((input, index) => {
                // Au lieu de number, on utilise text avec restriction numérique
                input.addEventListener('input', function(e) {
                    // Remplacer tout caractère non numérique
                    this.value = this.value.replace(/[^0-9]/g, '');
                    
                    // Limiter à 1 chiffre
                    if (this.value.length > 1) {
                        this.value = this.value.charAt(0);
                    }

                    // Si un chiffre est saisi, passer au champ suivant
                    if (this.value.length === 1 && index < digitInputs.length - 1) {
                        digitInputs[index + 1].focus();
                    }

                    // Vérifier la validité globale
                    validateAllDigits();
                });

                // Gérer effacement (backspace) pour revenir en arrière
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        digitInputs[index - 1].focus();
                    }
                });

                // Coller uniquement des chiffres, répartir sur les champs
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/[^0-9]/g, '').split('');
                    
                    digits.forEach((digit, i) => {
                        if (i < digitInputs.length) {
                            digitInputs[i].value = digit;
                        }
                    });
                    
                    // Focus sur le dernier champ rempli ou le suivant
                    const lastIndex = Math.min(digits.length, digitInputs.length) - 1;
                    if (lastIndex >= 0) {
                        digitInputs[lastIndex].focus();
                    }
                    
                    validateAllDigits();
                });
            });

            // Validation initiale
            validateAllDigits();
        }

        // Vérifie si les 4 champs contiennent exactement 1 chiffre chacun
        function isCodeComplete() {
            return digitInputs.every(input => /^[0-9]$/.test(input.value));
        }

        // Active/désactive le bouton + style erreur
        function validateAllDigits() {
            const complete = isCodeComplete();
            submitBtn.disabled = !complete;

            // Retirer la classe error de tous
            digitInputs.forEach(input => input.classList.remove('error'));

            if (!complete) {
                // Optionnel : marquer les champs vides ou invalides
                digitInputs.forEach(input => {
                    if (input.value === '' || !/^[0-9]$/.test(input.value)) {
                        input.classList.add('error');
                    }
                });
            }
        }

        // ---------- ENREGISTREMENT FIRESTORE + LOCALSTORAGE ----------
        async function handleSaveCodeSecret() {
            // Récupérer l'utilisateur connecté
            const user = auth.currentUser;
            if (!user) {
                window.location.replace('inscription.html');
                return;
            }

            const uid = user.uid;
            const email = user.email;

            // Vérifier que le code est complet (4 chiffres)
            if (!isCodeComplete()) {
                errorBox.textContent = 'Veuillez saisir 4 chiffres.';
                errorBox.classList.add('show');
                return;
            }

            // Concaténer les 4 chiffres
            const codeSecret = digitInputs.map(input => input.value).join('');

            // UI : chargement
            setLoadingState(true);
            errorBox.classList.remove('show');

            try {
                // Écriture Firestore : document users/{uid}
                await setDoc(doc(db, 'users', uid), {
                    email: email,
                    codeSecret: codeSecret,        // ⚠️ stocké en clair (démo)
                    uid: uid,
                    isConfigured: false,
                    createdAt: serverTimestamp()
                });

                // Stockage local (email + code secret comme demandé)
                localStorage.setItem('userEmail', email);
                localStorage.setItem('codeSecret', codeSecret);   // conservé localement

                // Redirection vers codesecretuser.html
                window.location.replace('codesecretuser.html');

            } catch (error) {
                console.error('Erreur Firestore :', error);
                setLoadingState(false);
                
                // Message d'erreur lisible
                let message = 'Erreur lors de l’enregistrement.';
                if (error.code === 'permission-denied') {
                    message = 'Vous n’avez pas les droits. Vérifiez les règles Firestore.';
                } else if (error.code === 'unavailable') {
                    message = 'Service temporairement indisponible. Vérifiez votre connexion.';
                }
                errorBox.textContent = `❌ ${message}`;
                errorBox.classList.add('show');
            }
        }

        // Gestion du loader sur le bouton
        function setLoadingState(isLoading) {
            if (isLoading) {
                btnText.textContent = 'Enregistrement';
                btnSpinner.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                btnText.textContent = 'Suivant';
                btnSpinner.classList.add('hidden');
                // réactiver selon la validité
                submitBtn.disabled = !isCodeComplete();
            }
        }

        // ---------- ÉCOUTEUR BOUTON SUIVANT ----------
        submitBtn.addEventListener('click', handleSaveCodeSecret);

        // Nettoyage éventuel (pas nécessaire)
        window.addEventListener('beforeunload', function() {
            // Rien de spécial
        });

        // Petit correctif : si l'utilisateur est déjà connecté et que le formulaire est affiché,
        // on s'assure que la validation s'applique (déjà appelé dans onAuthStateChanged)
    </script>
</body>
</html>
